<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>My Investment</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: #0B0E14;
    color: #E8E6DF;
    font-family: 'Space Grotesk', sans-serif;
    min-height: 100vh;
  }
  .mono { font-family: 'IBM Plex Mono', monospace; }
  .muted { color: #8A8F9E; }
  .faint { color: #5C6270; }
  .wrap { max-width: 480px; margin: 0 auto; padding: 60px 24px; }
  .eyebrow { color: #8A8F9E; font-family: 'IBM Plex Mono', monospace; font-size: 0.75rem; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 8px; }
  h1 { font-size: 1.8rem; font-weight: 700; color: #F4F2ED; margin: 0 0 32px 0; }

  .login-card { background: #12161F; border: 1px solid #232838; border-radius: 16px; padding: 32px; }
  .field { margin-bottom: 16px; }
  .field label { display: block; color: #8A8F9E; font-size: 0.85rem; margin-bottom: 6px; }
  .field input {
    width: 100%; background: #0B0E14; border: 1px solid #232838; color: #E8E6DF;
    padding: 10px 12px; border-radius: 8px; font-family: inherit; font-size: 0.95rem;
  }
  .login-btn {
    width: 100%; background: #D4A657; color: #12161F; border: none; padding: 12px;
    border-radius: 8px; font-weight: 600; font-size: 0.95rem; cursor: pointer; margin-top: 8px;
  }
  .login-error { color: #EB5757; font-size: 0.85rem; margin-top: 12px; text-align: center; }

  .hero { background: #12161F; border: 1px solid #232838; border-radius: 16px; padding: 32px; margin-bottom: 24px; text-align: center; }
  .hero-label { color: #8A8F9E; font-size: 0.85rem; margin-bottom: 10px; }
  .hero-value { font-family: 'IBM Plex Mono', monospace; font-size: 2.6rem; font-weight: 700; color: #F4F2ED; }
  .sub-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; }
  .sub-card { background: #12161F; border: 1px solid #232838; border-radius: 12px; padding: 18px; text-align: center; }
  .sub-label { color: #8A8F9E; font-size: 0.75rem; margin-bottom: 6px; }
  .sub-value { font-family: 'IBM Plex Mono', monospace; font-size: 1.2rem; font-weight: 600; }
  .up { color: #6FCF97; }
  .down { color: #EB5757; }
  .symbols-card { background: #12161F; border: 1px solid #232838; border-radius: 12px; padding: 20px; }
  .symbols-label { color: #8A8F9E; font-size: 0.8rem; margin-bottom: 12px; }
  .symbol-pills { display: flex; flex-wrap: wrap; gap: 8px; }
  .pill { background: #1B2030; border: 1px solid #2A3040; padding: 6px 12px; border-radius: 20px; font-family: 'IBM Plex Mono', monospace; font-size: 0.8rem; color: #D4A657; }
  .footer-note { color: #5C6270; font-size: 0.75rem; margin-top: 32px; text-align: center; }
  .logout-btn { background: none; border: 1px solid #232838; color: #8A8F9E; padding: 6px 12px; border-radius: 8px; font-size: 0.75rem; cursor: pointer; float: right; }
</style>
</head>
<body>
  <div class="wrap" id="app"></div>

<script>
const fmt = (n) => new Intl.NumberFormat('en-MY', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(n);

function renderLogin(errorMsg) {
  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="eyebrow">Investment Portal</div>
    <h1>Sign In</h1>
    <div class="login-card">
      <div class="field">
        <label>Username</label>
        <input type="text" id="username" autocomplete="username" />
      </div>
      <div class="field">
        <label>Password</label>
        <div style="position:relative;">
          <input type="password" id="password" autocomplete="current-password" style="padding-right:44px; box-sizing:border-box; width:100%;" />
          <button type="button" onclick="togglePwVisibility()" style="position:absolute; right:8px; top:50%; transform:translateY(-50%); background:none; border:none; color:#8A8F9E; cursor:pointer; font-size:0.75rem; padding:4px;">Show</button>
        </div>
      </div>
      <button class="login-btn" onclick="doLogin()">Sign In</button>
      ${errorMsg ? `<div class="login-error">${errorMsg}</div>` : ''}
    </div>
  `;
  document.getElementById('password').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') doLogin();
  });
}

function togglePwVisibility() {
  const input = document.getElementById('password');
  const btn = event.target;
  if (input.type === 'password') {
    input.type = 'text';
    btn.textContent = 'Hide';
  } else {
    input.type = 'password';
    btn.textContent = 'Show';
  }
}

async function doLogin() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  if (!username || !password) {
    renderLogin('Please enter both username and password.');
    return;
  }
  try {
    const res = await fetch('/api/customer-login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password }),
    });
    const data = await res.json();
    if (!res.ok) {
      renderLogin(data.error || 'Sign in failed.');
      return;
    }
    sessionStorage.setItem('customer_creds', JSON.stringify({ username, password }));
    renderSummary(data);
  } catch (e) {
    renderLogin(`Network error: ${e.message}`);
  }
}

function renderSummary(data) {
  const app = document.getElementById('app');
  const gainCls = data.gain >= 0 ? 'up' : 'down';
  const sign = data.gain >= 0 ? '+' : '';

  app.innerHTML = `
    <button class="logout-btn" onclick="logout()">Sign out</button>
    <div class="eyebrow">Investment Summary</div>
    <h1>Welcome, ${data.name}</h1>

    <div class="hero">
      <div class="hero-label">Current Value</div>
      <div class="hero-value">RM ${fmt(data.currentValue)}</div>
    </div>

    <div class="sub-cards">
      <div class="sub-card">
        <div class="sub-label">Invested</div>
        <div class="sub-value mono">RM ${fmt(data.contributed)}</div>
      </div>
      <div class="sub-card">
        <div class="sub-label">Gain/Loss</div>
        <div class="sub-value mono ${gainCls}">${sign}RM ${fmt(Math.abs(data.gain))} (${sign}${data.gainPct.toFixed(2)}%)</div>
      </div>
    </div>

    ${data.investmentDate ? `
    <div class="sub-cards">
      <div class="sub-card">
        <div class="sub-label">Investment Date</div>
        <div class="sub-value mono" style="font-size:1rem;">${data.investmentDate}</div>
      </div>
      <div class="sub-card">
        <div class="sub-label">Guaranteed Return Payout Date</div>
        <div class="sub-value mono" style="font-size:1rem;">${data.guaranteedPayoutDate}</div>
      </div>
    </div>
    <div class="symbols-card" style="margin-bottom:24px;">
      <div class="symbols-label">Guaranteed Return (6% p.a.)</div>
      <div class="mono" style="font-size:1.1rem; color:#D4A657;">RM ${fmt(data.guaranteedTargetAmount)}</div>
    </div>
    ` : ''}

    <div class="symbols-card">
      <div class="symbols-label">This fund currently holds positions in:</div>
      <div class="symbol-pills">
        ${data.symbols.map(s => `<span class="pill">${s}</span>`).join('')}
      </div>
    </div>

    <div class="footer-note">
      Not investment advice.
    </div>
  `;
}

function logout() {
  sessionStorage.removeItem('customer_creds');
  renderLogin();
}

async function tryAutoLogin() {
  const saved = sessionStorage.getItem('customer_creds');
  if (!saved) { renderLogin(); return; }
  const { username, password } = JSON.parse(saved);
  try {
    const res = await fetch('/api/customer-login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password }),
    });
    const data = await res.json();
    if (res.ok) renderSummary(data);
    else { sessionStorage.removeItem('customer_creds'); renderLogin(); }
  } catch {
    renderLogin();
  }
}

tryAutoLogin();
</script>
</body>
</html>
